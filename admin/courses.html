<!DOCTYPE html>
<html lang="en-gb">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Manage Courses</title>
    <meta name="description" content="Manage golf courses: view, add with AI lookup, edit par and stroke index." />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
      :root {
        --admin-primary: #2dc26b;
        --admin-primary-hover: #25a85a;
        --admin-border: #e0e0e0;
        --admin-bg: #fafafa;
      }
      .content .entry-wrapper.content__entry {
        padding-left: 0.25rem;
        padding-right: 0.25rem;
        width: auto;
      }
      .admin-container {
        max-width: 1200px;
        margin: 2em 0;
        padding: 2em 0.25rem;
      }
      .admin-header {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
        gap: 1em;
        margin-bottom: 2em;
        padding-bottom: 1em;
        border-bottom: 2px solid var(--admin-primary);
      }
      .admin-header .btn { margin: 0; }
      .btn {
        padding: 0.5em 1.25em;
        min-height: 2.5rem;
        background: var(--admin-primary);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: background 0.2s, transform 0.1s;
        text-decoration: none;
        display: inline-block;
        box-sizing: border-box;
      }
      .btn:hover { background: var(--admin-primary-hover); }
      .btn:active { transform: scale(0.98); }
      .btn:disabled { opacity: 0.7; cursor: not-allowed; }
      .btn-secondary { background: #555; }
      .btn-secondary:hover { background: #444; }
      .btn-lookup {
        background: #1a5f2a;
        color: #fff;
      }
      .btn-lookup:hover {
        background: #0d3d18;
      }
      .btn-lookup.is-loading { background: #1a5f2a; }
      .btn-danger { background: #c33; }
      .btn-danger:hover { background: #a22; }
      .btn-sm { padding: 0.4em 0.9em; min-height: 2rem; font-size: 0.875rem; }
      .btn.is-loading, .btn.is-saving {
        pointer-events: none;
        opacity: 0.85;
      }
      .btn.is-loading::after, .btn.is-saving::after {
        content: '';
        display: inline-block;
        width: 1em;
        height: 1em;
        margin-left: 0.5em;
        vertical-align: middle;
        border: 2px solid rgba(255,255,255,0.5);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .admin-hero-top { margin-top: 0; position: relative; }
      .admin-hero-logo {
        position: absolute;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 2;
      }
      .admin-hero-logo a { display: block; }
      .admin-hero-logo img { display: block; height: 2.5rem; width: auto; }
      .courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.25em;
      }
      .course-card {
        background: #2a2a2a;
        border: 2px solid transparent;
        border-radius: 12px;
        padding: 1.25em;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
        cursor: pointer;
      }
      .course-card:hover {
        box-shadow: 0 6px 16px rgba(0,0,0,0.3);
        border-color: var(--admin-primary);
        transform: translateY(-4px);
      }
      .course-card__row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1em;
      }
      .course-card__title {
        font-weight: 700;
        color: white;
        font-size: 1.1em;
        flex: 1;
        min-width: 0;
      }
      .course-card__par {
        color: #b0b0b0;
        font-size: 0.95em;
        flex-shrink: 0;
      }
      .course-card__par strong { color: #2dc26b; }
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.45);
        overflow: auto;
        padding: 1em;
        box-sizing: border-box;
      }
      .modal.is-open {
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .modal-content {
        background: white;
        margin: 2vh auto;
        padding: 2em;
        border-radius: 10px;
        max-width: 640px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5em;
        padding-bottom: 1em;
        border-bottom: 1px solid var(--admin-border);
      }
      .modal-header h2 { margin: 0; color: var(--admin-primary); font-size: 1.35rem; }
      .close {
        color: #888;
        font-size: 1.75rem;
        line-height: 1;
        cursor: pointer;
        border: none;
        background: none;
        padding: 0.25em;
        width: 36px;
        height: 36px;
        border-radius: 6px;
        transition: background 0.2s, color 0.2s;
      }
      .close:hover { color: #000; background: #eee; }
      .form-group { margin-bottom: 1.2em; }
      .form-group label {
        display: block;
        margin-bottom: 0.4em;
        font-weight: 600;
        color: #333;
      }
      .form-group input {
        width: 100%;
        padding: 0.65em 0.85em;
        border: 1px solid var(--admin-border);
        border-radius: 6px;
        font-size: 1em;
        box-sizing: border-box;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--admin-primary);
        box-shadow: 0 0 0 2px rgba(45, 194, 107, 0.2);
      }
      .form-group__lookup {
        margin-top: 0.5em;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5em;
      }
      .form-group__lookup .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        align-self: center;
        margin: 0;
        height: 2rem;
        min-height: 2rem;
        line-height: 1;
        vertical-align: middle;
      }
      .form-group__lookup .lookup-status {
        margin: 0;
      }
      .ai-paste-section { margin-top: 0.75em; }
      .ai-paste-section__hint { margin-bottom: 0.35em; font-size: 0.9rem; color: #555; }
      .ai-paste-json {
        display: block;
        width: 100%;
        max-width: 32rem;
        font-family: monospace;
        font-size: 0.8rem;
        padding: 0.5em;
        margin-bottom: 0.5em;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .hole-grid-section {
        margin-top: 1.5em;
        margin-bottom: 1em;
      }
      .hole-grid-section label { font-weight: 600; color: #333; margin-bottom: 0.5em; display: block; }
      .hole-grid-wrap {
        display: flex;
        justify-content: center;
        max-width: 100%;
      }
      .hole-table {
        width: auto;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      .hole-table th,
      .hole-table td {
        padding: 0.2em 0.35em;
        text-align: left;
        border-bottom: 1px solid var(--admin-border);
      }
      .hole-table th {
        background: var(--admin-bg);
        font-weight: 600;
        color: #333;
      }
      .hole-table th.hole-table__group {
        text-align: center;
        font-size: 0.85em;
        color: #555;
      }
      .hole-table .hole-table__sep {
        width: 0.5rem;
        padding-left: 0.25em;
        border-left: 1px solid var(--admin-border);
      }
      .hole-table input {
        width: 2.5em;
        padding: 0.25em;
        border: 1px solid var(--admin-border);
        border-radius: 4px;
        font-size: 1em;
        text-align: center;
      }
      .hole-table input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .hole-table input[type="number"]::-webkit-outer-spin-button,
      .hole-table input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .hole-table td:nth-child(3) input,
      .hole-table td:nth-child(7) input {
        font-size: 0.85em;
      }
      .hole-table input.is-different {
        background: #fff3cd;
      }
      .hole-table .hole-total-row {
        font-weight: 600;
        background: var(--admin-bg);
      }
      .hole-table .hole-total-row td { padding: 0.5em 0.5em; }
      .btn-before-after {
        padding: 0.35em 0.6em;
        font-size: 0.85rem;
        min-height: 1.75rem;
        min-width: 5.5em;
        box-sizing: border-box;
        background: #f0f0f0;
        color: #333;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-before-after:hover { background: #e5e5e5; }
      .form-actions {
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        justify-content: flex-start;
        gap: 0.75em;
        margin-top: 1.75em;
        padding-top: 1.25em;
        border-top: 1px solid var(--admin-border);
      }
      .form-actions__spacer { flex: 1; min-width: 0.5rem; }
      .form-actions .btn {
        height: 2.5rem;
        min-height: 2.5rem;
        padding: 0 1.25em;
        font-size: 1rem;
        flex-shrink: 0;
        min-width: 6em;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }
      @media (max-width: 480px) {
        .form-actions { gap: 0.5em; }
        .form-actions .btn.btn-danger,
        .form-actions .btn.btn-secondary {
          min-width: 4.5em;
          padding: 0 0.6em;
          font-size: 0.9rem;
        }
        .form-actions .btn:not(.btn-danger):not(.btn-secondary) {
          min-width: 5em;
          padding: 0 0.75em;
          font-size: 0.9rem;
        }
      }
      @media (max-width: 420px) {
        .form-actions {
          flex-direction: column;
          align-items: center;
          gap: 0.5em;
        }
        .form-actions .btn {
          min-width: 0;
          width: 100%;
          max-width: 14rem;
          padding: 0 1.25em;
          font-size: 1rem;
          margin-left: 0;
          margin-right: 0;
          box-sizing: border-box;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .form-actions .btn.btn-danger,
        .form-actions .btn.btn-secondary {
          min-width: 0;
          width: 100%;
          max-width: 14rem;
          padding: 0 1.25em;
          font-size: 1rem;
          margin-left: 0;
          margin-right: 0;
          box-sizing: border-box;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .form-actions__spacer { display: none; }
      }
      .lookup-status { margin-top: 0.5em; min-height: 1.25em; font-size: 0.9rem; color: #666; }
      .lookup-status.error { color: #721c24; background: #f8d7da; padding: 0.5em 0.75em; border-radius: 6px; }
      .alert {
        padding: 0.9em 1.2em;
        margin: 0 0 1em 0;
        border-radius: 6px;
      }
      .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
      .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
      .empty-state {
        text-align: center;
        padding: 3em 2em;
        color: #666;
        background: var(--admin-bg);
        border-radius: 8px;
        border: 1px dashed var(--admin-border);
      }
      .empty-state p { margin: 0 0 1em 0; }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>

            <span class="navbar__toggle-inner">Menu</span>

    <!-- Course Add/Edit Modal -->

          <h2 id="courseModalTitle">Add course</h2>
          <button type="button" class="close" id="courseModalClose" aria-label="Close">&times;</button>
        </div>
        <form id="courseForm">
          <div class="form-group">
            <label for="editCourseName">Course name *</label>
            <input type="text" id="editCourseName" required placeholder="e.g. Elmgreen Golf Club" />
            <div class="form-group__lookup">
              <button type="button" id="fillWithAiBtn" class="btn btn-lookup btn-sm">Fill with AI</button>

              <p class="ai-paste-section__hint">Paste the JSON result from your AI console below, then click Apply.</p>
              <textarea id="aiPasteJson" class="ai-paste-json" rows="6" placeholder='{"pars":[4,4,3,...],"indexes":[5,13,...],"website":"https://...","clubName":"..."}'></textarea>
              <button type="button" id="applyAiResultBtn" class="btn btn-sm">Apply</button>

            <label for="editClubName">Club name</label>

            <input type="text" id="editCourseMapLoc" placeholder="https://www.google.com/maps/search/..." />

              <table class="hole-table" id="holeTable">
                <thead>
                  <tr>
                    <th colspan="3" class="hole-table__group">Front 9</th>
                    <th class="hole-table__sep"></th>
                    <th colspan="3" class="hole-table__group">Back 9</th>
                  </tr>
                  <tr>
                    <th>#</th><th>Par</th><th>Index</th>
                    <th class="hole-table__sep"></th>
                    <th>#</th><th>Par</th><th>Index</th>
                  </tr>
                </thead>
                <tbody id="holeTbody"></tbody>
                <tfoot>
                  <tr class="hole-total-row">
                    <td>Out</td><td id="parOut">0</td><td></td>
                    <td class="hole-table__sep"></td>
                    <td>In</td><td id="parIn">0</td><td></td>
                  </tr>
                  <tr class="hole-total-row">
                    <td></td><td></td><td></td>
                    <td class="hole-table__sep"></td>
                    <td></td>
                    <td>Par</td><td id="parTotal">0</td>

          <div class="form-actions">
            <button type="button" class="btn btn-danger" id="courseFormDelete" style="display: none;">Delete</button>
            <button type="button" class="btn btn-secondary" id="courseFormCancel">Cancel</button>

      <div class="wrapper">
        <div class="footer__copyright">

      </div>

    <script src="../assets/js/config/app-config.js"></script>

    <script>
      (function() {
        // Frontend-controlled AI model for course lookup.
        // Change this value when you want to switch models without backend edits.
        const COURSE_LOOKUP_AI_MODEL = 'gemini-2.5-flash';

        const alertContainer = document.getElementById('alertContainer');
        const coursesContainer = document.getElementById('courses-container');
        const fillWithAiBtn = document.getElementById('fillWithAiBtn');
        const generatePromptBtn = document.getElementById('generatePromptBtn');
        const aiPromptStatus = document.getElementById('aiPromptStatus');
        const aiPasteSection = document.getElementById('aiPasteSection');
        const aiPasteJson = document.getElementById('aiPasteJson');
        const applyAiResultBtn = document.getElementById('applyAiResultBtn');
        const btnAddCourse = document.getElementById('btnAddCourse');
        const courseModal = document.getElementById('courseModal');
        const courseModalTitle = document.getElementById('courseModalTitle');
        const courseModalClose = document.getElementById('courseModalClose');
        const courseForm = document.getElementById('courseForm');
        const editCourseName = document.getElementById('editCourseName');
        const editClubName = document.getElementById('editClubName');
        const editCourseURL = document.getElementById('editCourseURL');
        const editCourseMapLoc = document.getElementById('editCourseMapLoc');
        const holeTbody = document.getElementById('holeTbody');
        const parOutEl = document.getElementById('parOut');
        const parInEl = document.getElementById('parIn');
        const parTotalEl = document.getElementById('parTotal');
        const beforeAfterWrap = document.getElementById('beforeAfterWrap');
        const courseFormDelete = document.getElementById('courseFormDelete');
        const courseFormCancel = document.getElementById('courseFormCancel');
        const courseFormSubmit = document.getElementById('courseFormSubmit');

        let courses = [];
        let editingCourse = null;
        var beforeLookupData = null;
        var afterLookupData = null;
        var showingAfter = true;

        function escJs(s) {
          return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r/g, '').replace(/\n/g, '\\n');
        }

        /** Parse parIndx string into { pars: [18], indexes: [18] }. Format: "p1,...,p18,i1,...,i18" */
        function parseParIndx(parIndx) {
          const s = (parIndx || '').toString().trim();
          const parts = s ? s.split(',') : [];
          const pars = [];
          const indexes = [];
          for (var i = 0; i < 18; i++) {
            pars.push(parseInt(parts[i], 10) || 0);
            indexes.push(parseInt(parts[i + 18], 10) || 0);
          }
          return { pars: pars, indexes: indexes };
        }

        /** Compute par total from parIndx string */
        function parTotalFromParIndx(parIndx) {
          const p = parseParIndx(parIndx);
          return p.pars.reduce(function(a, b) { return a + b; }, 0);
        }

        /** Build parIndx string from 18 par and 18 index inputs */
        function buildParIndxFromInputs() {
          var pars = [], indexes = [];
          for (var i = 1; i <= 18; i++) {
            var parInp = document.getElementById('holePar' + i);
            var idxInp = document.getElementById('holeIdx' + i);
            pars.push(parseInt(parInp && parInp.value ? parInp.value : 0, 10) || 0);
            indexes.push(parseInt(idxInp && idxInp.value ? idxInp.value : 0, 10) || 0);
          }
          return pars.join(',') + ',' + indexes.join(',');
        }

        function updateParTotals() {
          var out = 0, inTot = 0;
          for (var i = 1; i <= 9; i++) {
            var el = document.getElementById('holePar' + i);
            if (el) out += parseInt(el.value, 10) || 0;
          }
          for (var j = 10; j <= 18; j++) {
            var el = document.getElementById('holePar' + j);
            if (el) inTot += parseInt(el.value, 10) || 0;
          }
          if (parOutEl) parOutEl.textContent = out;
          if (parInEl) parInEl.textContent = inTot;
          if (parTotalEl) parTotalEl.textContent = out + inTot;
        }

        function renderHoleInputs() {
          holeTbody.innerHTML = '';
          for (var h = 1; h <= 9; h++) {
            var tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + h + '</td><td><input type="number" min="3" max="5" id="holePar' + h + '" value="0" /></td><td><input type="number" min="1" max="18" id="holeIdx' + h + '" value="0" /></td>' +
              '<td class="hole-table__sep"></td>' +
              '<td>' + (h + 9) + '</td><td><input type="number" min="3" max="5" id="holePar' + (h + 9) + '" value="0" /></td><td><input type="number" min="1" max="18" id="holeIdx' + (h + 9) + '" value="0" /></td>';
            holeTbody.appendChild(tr);
          }
          [].forEach.call(document.querySelectorAll('#holeTable input'), function(inp) {
            inp.addEventListener('input', updateParTotals);
            inp.addEventListener('change', updateParTotals);
          });
          updateParTotals();
        }

        function setHoleValues(pars, indexes) {
          for (var i = 0; i < 18; i++) {
            var parInp = document.getElementById('holePar' + (i + 1));
            var idxInp = document.getElementById('holeIdx' + (i + 1));
            if (parInp) parInp.value = pars[i] || 0;
            if (idxInp) idxInp.value = indexes[i] || 0;
          }
          updateParTotals();
        }

        /** Get current pars and indexes from form inputs */
        function getCurrentHoleDataFromForm() {
          return parseParIndx(buildParIndxFromInputs());
        }

        /** Mark inputs that differ from the given "other" set with is-different */
        function applyDiffHighlights(otherPars, otherIndexes) {
          if (!otherPars || !otherIndexes) return;
          for (var i = 0; i < 18; i++) {
            var parInp = document.getElementById('holePar' + (i + 1));
            var idxInp = document.getElementById('holeIdx' + (i + 1));
            var curPar = parseInt(parInp && parInp.value ? parInp.value : 0, 10) || 0;
            var curIdx = parseInt(idxInp && idxInp.value ? idxInp.value : 0, 10) || 0;
            var otherP = otherPars[i] || 0;
            var otherI = otherIndexes[i] || 0;
            if (parInp) {
              if (curPar !== otherP) parInp.classList.add('is-different');
              else parInp.classList.remove('is-different');
            }
            if (idxInp) {
              if (curIdx !== otherI) idxInp.classList.add('is-different');
              else idxInp.classList.remove('is-different');
            }
          }
        }

        function clearBeforeAfterState() {
          beforeLookupData = null;
          afterLookupData = null;
          showingAfter = true;
          beforeAfterWrap.innerHTML = '';
          [].forEach.call(document.querySelectorAll('#holeTable input.is-different'), function(inp) { inp.classList.remove('is-different'); });
        }

        function showBeforeAfterToggle() {
          beforeAfterWrap.innerHTML = '';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'btn-before-after';
          btn.textContent = showingAfter ? 'After' : 'Before';
          btn.addEventListener('click', function() {
            if (!beforeLookupData || !afterLookupData) return;
            if (showingAfter) {
              setHoleValues(beforeLookupData.pars, beforeLookupData.indexes);
              showingAfter = false;
              applyDiffHighlights(afterLookupData.pars, afterLookupData.indexes);
              btn.textContent = 'Before';
            } else {
              setHoleValues(afterLookupData.pars, afterLookupData.indexes);
              showingAfter = true;
              applyDiffHighlights(beforeLookupData.pars, beforeLookupData.indexes);
              btn.textContent = 'After';
            }
          });
          beforeAfterWrap.appendChild(btn);
        }

        function showAlert(type, message) {
          const alert = document.createElement('div');
          alert.className = 'alert alert-' + type;
          alert.textContent = message;
          alertContainer.innerHTML = '';
          alertContainer.appendChild(alert);
          setTimeout(function() { alert.remove(); }, 6000);
        }

        function setAiPromptStatus(msg, isError) {
          aiPromptStatus.textContent = msg || '';
          aiPromptStatus.className = 'lookup-status' + (isError ? ' error' : '');
        }

        function buildAiPrompt(courseName) {
          return 'Get 18-hole par and stroke index (Men\'s/Championship tees) for: ' + courseName + '.\n\n' +
            'SOURCE (in this order):\n' +
            '1. Official club website. Look up the course, find its official website, and get the full scorecard (par and stroke index for holes 1–18) from that site. Use this if available.\n' +
            '2. Only if the official website does not have the scorecard or you cannot find it, use Hole19 to get the 18 pars and 18 stroke indexes.\n\n' +
            'Reply with a single JSON object only (no markdown, no explanation). Valid JSON with these keys:\n' +
            '"pars" = array of 18 integers (par per hole), "indexes" = array of 18 integers (stroke index per hole), "website" = club URL or "", "clubName" = official name or "", "courseMapLoc" = Google Maps directions/search URL or "".\n' +
            'Example: {"pars":[4,4,3,4,5,4,3,4,5,4,4,3,4,5,4,3,4,5],"indexes":[5,13,17,9,1,11,15,7,3,10,16,6,2,14,18,8,4,12],"website":"https://example.com","clubName":"Club Name","courseMapLoc":"https://www.google.com/maps/search/Club+Name"}';
        }

        function applyAiCourseResult(data) {
          var pars = Array.isArray(data && data.pars) ? data.pars : [];
          var indexes = Array.isArray(data && data.indexes) ? data.indexes : [];
          if (pars.length < 18 || indexes.length < 18) {
            throw new Error('AI result must include "pars" and "indexes" arrays with 18 numbers each.');
          }
          var parArr = [];
          var idxArr = [];
          for (var i = 0; i < 18; i++) {
            parArr.push(parseInt(pars[i], 10) || 0);
            idxArr.push(parseInt(indexes[i], 10) || 0);
          }
          var parIndx = parArr.join(',') + ',' + idxArr.join(',');
          var website = typeof data.website === 'string' ? data.website.trim() : '';
          var mdLinkMatch = website.match(/\[[^\]]*\]\(([^)]+)\)/);
          if (mdLinkMatch) website = mdLinkMatch[1].trim();
          var mapLoc = typeof data.courseMapLoc === 'string' ? data.courseMapLoc.trim() : '';
          if (!mapLoc && typeof data.courseMaploc === 'string') mapLoc = data.courseMaploc.trim();
          var mapMdLinkMatch = mapLoc.match(/\[[^\]]*\]\(([^)]+)\)/);
          if (mapMdLinkMatch) mapLoc = mapMdLinkMatch[1].trim();
          var clubName = typeof data.clubName === 'string' ? data.clubName.trim() : '';
          var courseName = (typeof data.courseName === 'string' ? data.courseName.trim() : '') || editCourseName.value.trim();
          beforeLookupData = getCurrentHoleDataFromForm();
          fillCourseFormFromData({
            courseName: courseName,
            parIndx: parIndx,
            courseURL: website,
            clubName: clubName,
            courseMaploc: mapLoc
          });
          afterLookupData = getCurrentHoleDataFromForm();
          showingAfter = true;
          applyDiffHighlights(beforeLookupData.pars, beforeLookupData.indexes);
          showBeforeAfterToggle();
        }

        function extractBalancedJsonObject(text) {
          var cleaned = String(text || '').replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
          var firstBrace = cleaned.indexOf('{');
          if (firstBrace < 0) return cleaned;
          var depth = 0;
          var inString = false;
          var escaped = false;
          for (var i = firstBrace; i < cleaned.length; i++) {
            var ch = cleaned.charAt(i);
            if (inString) {
              if (escaped) {
                escaped = false;
              } else if (ch === '\\') {
                escaped = true;
              } else if (ch === '"') {
                inString = false;
              }
              continue;
            }
            if (ch === '"') {
              inString = true;
              continue;
            }
            if (ch === '{') depth++;
            if (ch === '}') {
              depth--;
              if (depth === 0) return cleaned.substring(firstBrace, i + 1);
            }
          }
          return cleaned;
        }

        function parseAiJsonFromText(raw) {
          var source = String(raw || '').trim();
          if (!source) return null;
          try { return JSON.parse(source); } catch (e) {}
          var extracted = extractBalancedJsonObject(source);
          try { return JSON.parse(extracted); } catch (e2) {}
          var deTrailed = extracted.replace(/,\s*([}\]])/g, '$1');
          try { return JSON.parse(deTrailed); } catch (e3) {}
          // Handle common markdown escapes in AI output that break JSON parsing.
          var deEscaped = deTrailed
            .replace(/\\&/g, '&')
            .replace(/\\_/g, '_')
            .replace(/\\\*/g, '*');
          try { return JSON.parse(deEscaped); } catch (e4) {}
          return null;
        }

        function loadCourses() {
          ApiClient.get({ action: 'getCourses' })
            .then(function(res) {
              courses = (res && res.courses) || [];
              renderCourses();
            })
            .catch(function(err) {
              courses = [];
              coursesContainer.innerHTML = '<div class="empty-state">Error loading courses: ' + Formatters.escapeHtml(err.message || 'Unknown error') + '</div>';
            });
        }

        function renderCourses() {
          if (courses.length === 0) {
            coursesContainer.innerHTML = '<div class="empty-state"><p>No courses yet.</p><p><button type="button" class="btn" id="btnAddCourseEmpty">+ Add course</button></p></div>';
            var btn = document.getElementById('btnAddCourseEmpty');
            if (btn) btn.addEventListener('click', openAddModal);
            return;
          }
          var sorted = courses.slice().sort(function(a, b) {
            return (a.courseName || '').localeCompare(b.courseName || '', undefined, { sensitivity: 'base' });
          });
          var html = '<div class="courses-grid">';
          sorted.forEach(function(c) {
            var parTot = parTotalFromParIndx(c.parIndx);
            var nameEsc = Formatters.escapeHtml(c.courseName || '');
            html += '<div class="course-card" data-course-name="' + nameEsc + '" role="button" tabindex="0">' +
              '<div class="course-card__row">' +
              '<span class="course-card__title">' + nameEsc + '</span>' +
              '<span class="course-card__par">Par: <strong>' + parTot + '</strong></span>' +
              '</div>' +
              '</div>';
          });
          html += '</div>';
          coursesContainer.innerHTML = html;
          coursesContainer.querySelectorAll('.course-card').forEach(function(card) {
            card.addEventListener('click', function() { window.editCourse(card.getAttribute('data-course-name')); });
            card.addEventListener('keydown', function(e) {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                window.editCourse(card.getAttribute('data-course-name'));
              }
            });
          });
        }

        window.editCourse = function(courseName) {
          var c = courses.find(function(x) { return (x.courseName || '').trim().toLowerCase() === String(courseName).toLowerCase(); });
          if (!c) {
            showAlert('error', 'Course not found');
            return;
          }
          clearBeforeAfterState();
          aiPasteSection.style.display = 'none';
          aiPasteJson.value = '';
          setAiPromptStatus('');
          editingCourse = c;
          courseModalTitle.textContent = 'Edit course';
          editCourseName.value = c.courseName || '';
          editCourseName.disabled = false;
          editClubName.value = c.clubName || '';
          editCourseURL.value = c.courseURL || '';
          editCourseMapLoc.value = c.courseMaploc || '';
          var p = parseParIndx(c.parIndx);
          setHoleValues(p.pars, p.indexes);
          courseFormDelete.style.display = 'inline-block';
          courseModal.classList.add('is-open');
          document.body.style.overflow = 'hidden';
        };

        function openAddModal() {
          editingCourse = null;
          clearBeforeAfterState();
          courseModalTitle.textContent = 'Add course';
          courseForm.reset();
          editCourseName.disabled = false;
          editCourseName.value = '';
          editClubName.value = '';
          editCourseURL.value = '';
          editCourseMapLoc.value = '';
          setAiPromptStatus('');
          aiPasteSection.style.display = 'none';
          aiPasteJson.value = '';
          renderHoleInputs();
          courseFormDelete.style.display = 'none';
          courseModal.classList.add('is-open');
          document.body.style.overflow = 'hidden';
          setTimeout(function() { editCourseName.focus(); }, 50);
        }

        function closeCourseModal() {
          courseModal.classList.remove('is-open');
          document.body.style.overflow = '';
          editingCourse = null;
          clearBeforeAfterState();
          setAiPromptStatus('');
          aiPasteSection.style.display = 'none';
          aiPasteJson.value = '';
        }

        function openAddModalWithData(data) {
          editingCourse = null;
          courseModalTitle.textContent = 'Add course';
          fillCourseFormFromData(data);
          courseFormDelete.style.display = 'none';
          courseModal.classList.add('is-open');
          document.body.style.overflow = 'hidden';
        }

        /** Populate course form fields and hole grid from API/data (used after AI lookup or when opening with data). */
        function fillCourseFormFromData(data) {
          editCourseName.value = data.courseName || '';
          editClubName.value = data.clubName || '';
          editCourseURL.value = data.courseURL || '';
          editCourseMapLoc.value = data.courseMaploc || '';
          var p = parseParIndx(data.parIndx || '');
          if (holeTbody.innerHTML === '') renderHoleInputs();
          setHoleValues(p.pars, p.indexes);
        }

        btnAddCourse.addEventListener('click', openAddModal);
        courseModalClose.addEventListener('click', closeCourseModal);
        courseFormCancel.addEventListener('click', closeCourseModal);

        courseForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var name = (editCourseName.value || '').trim();
          if (!name) {
            showAlert('error', 'Course name is required.');
            return;
          }
          var parIndx = buildParIndxFromInputs();
          var payload = {
            courseName: name,
            parIndx: parIndx,
            courseURL: (editCourseURL.value || '').trim(),
            courseMaploc: (editCourseMapLoc.value || '').trim(),
            clubName: (editClubName.value || '').trim(),
            courseImage: ''
          };
          if (editingCourse) payload.originalCourseName = (editingCourse.courseName || '').trim();
          courseFormSubmit.disabled = true;
          courseFormSubmit.classList.add('is-saving');
          courseFormSubmit.textContent = 'Saving…';
          ApiClient.post(editingCourse ? 'updateCourse' : 'saveCourse', payload)
            .then(function() {
              courseFormSubmit.disabled = false;
              courseFormSubmit.classList.remove('is-saving');
              courseFormSubmit.textContent = 'Save course';
              showAlert('success', editingCourse ? 'Course updated.' : 'Course saved.');
              closeCourseModal();
              loadCourses();
            })
            .catch(function(err) {
              courseFormSubmit.disabled = false;
              courseFormSubmit.classList.remove('is-saving');
              courseFormSubmit.textContent = 'Save course';
              showAlert('error', err.message || 'Save failed.');
            });
        });

        courseFormDelete.addEventListener('click', function() {
          if (!editingCourse || !editingCourse.courseName) return;
          var _cn = editingCourse.courseName; if (!confirm("Delete course \"" + _cn.replace(/"/g, '\\"') + "\"? This cannot be undone.")) return;
          courseFormDelete.disabled = true;
          courseFormSubmit.disabled = true;
          courseFormCancel.disabled = true;
          ApiClient.post('deleteCourse', { courseName: editingCourse.courseName })
            .then(function() {
              showAlert('success', 'Course deleted.');
              closeCourseModal();
              loadCourses();
            })
            .catch(function(err) {
              showAlert('error', err.message || 'Delete failed.');
            })
            .finally(function() {
              courseFormDelete.disabled = false;
              courseFormSubmit.disabled = false;
              courseFormCancel.disabled = false;
            });
        });

        generatePromptBtn.addEventListener('click', function() {
          var name = (editCourseName.value || '').trim();
          if (!name) {
            setAiPromptStatus('Enter a course name first.', true);
            return;
          }
          var promptText = buildAiPrompt(name);
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(promptText).then(function() {
              setAiPromptStatus('Prompt copied. Use it in your preferred AI console, then paste the JSON result below.');
              aiPasteSection.style.display = 'block';
            }).catch(function() {
              setAiPromptStatus('Could not copy. Copy the prompt from the console.', true);
              console.log('AI prompt:\n' + promptText);
              aiPasteSection.style.display = 'block';
            });
          } else {
            setAiPromptStatus('Use the prompt below in your AI console, then paste the JSON result.');
            console.log('AI prompt:\n' + promptText);
            aiPasteSection.style.display = 'block';
          }
        });

        fillWithAiBtn.addEventListener('click', function() {
          var name = (editCourseName.value || '').trim();
          if (!name) {
            setAiPromptStatus('Enter a course name first.', true);
            return;
          }
          var promptText = buildAiPrompt(name);
          fillWithAiBtn.disabled = true;
          fillWithAiBtn.classList.add('is-loading');
          setAiPromptStatus('Finding course data with AI…');
          ApiClient.post('lookupCourseWithAi', {
            courseName: name,
            prompt: promptText,
            model: COURSE_LOOKUP_AI_MODEL
          }, 'global')
            .then(function(res) {
              var aiData = (res && res.data) || {};
              applyAiCourseResult(aiData);
              setAiPromptStatus('Fields filled from AI. Review changes and click Save course to confirm.');
            })
            .catch(function(err) {
              setAiPromptStatus(err && err.message ? err.message : 'AI lookup failed.', true);
            })
            .finally(function() {
              fillWithAiBtn.disabled = false;
              fillWithAiBtn.classList.remove('is-loading');
            });
        });

        applyAiResultBtn.addEventListener('click', function() {
          var raw = (aiPasteJson.value || '').trim();
          var data = parseAiJsonFromText(raw);
          if (!data) {
            setAiPromptStatus('Invalid JSON. Paste the exact JSON from your AI (e.g. {"pars":[...],"indexes":[...],...}).', true);
            return;
          }
          try {
            applyAiCourseResult(data);
            setAiPromptStatus('Applied. Review changes and save or cancel.');
          } catch (e) {
            setAiPromptStatus(e && e.message ? e.message : 'Could not apply AI result.', true);
          }
        });

        window.onclick = function(event) {
          if (event.target === courseModal) closeCourseModal();
        };

        renderHoleInputs();
        if (typeof AppConfig !== 'undefined' && AppConfig.init) {
          AppConfig.init().then(loadCourses).catch(function() { loadCourses(); });
        } else {
          loadCourses();
        }
      })();
    </script>
    <script defer="defer" src="../assets/js/scripts.min.js"></script>
    <script>
      window.themeMenuConfig = {
        mobileMenuMode: "overlay",
        animationSpeed: 300,
        submenuWidth: "auto",
        doubleClickTime: 500,
        mobileMenuExpandableSubmenus: true,
        relatedContainerForOverlayMenuSelector: ".top",
      };
    </script>
  </body>
