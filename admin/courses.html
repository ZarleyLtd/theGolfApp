<!DOCTYPE html>
<html lang="en-gb">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Manage Courses</title>
    <meta name="description" content="Manage golf courses: view, add with AI lookup, edit par and stroke index." />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
      :root {
        --admin-primary: #2dc26b;
        --admin-primary-hover: #25a85a;
        --admin-border: #e0e0e0;
        --admin-bg: #fafafa;
      }
      .content .entry-wrapper.content__entry {
        padding-left: 0.25rem;
        padding-right: 0.25rem;
        width: auto;
      }
      .admin-container {
        max-width: 1200px;
        margin: 2em 0;
        padding: 2em 0.25rem;
      }
      .admin-header {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
        gap: 1em;
        margin-bottom: 2em;
        padding-bottom: 1em;
        border-bottom: 2px solid var(--admin-primary);
      }
      .admin-header .btn { margin: 0; }
      .btn {
        padding: 0.5em 1.25em;
        min-height: 2.5rem;
        background: var(--admin-primary);
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: 500;
        transition: background 0.2s, transform 0.1s;
        text-decoration: none;
        display: inline-block;
        box-sizing: border-box;
      }
      .btn:hover { background: var(--admin-primary-hover); }
      .btn:active { transform: scale(0.98); }
      .btn:disabled { opacity: 0.7; cursor: not-allowed; }
      .btn-secondary { background: #555; }
      .btn-secondary:hover { background: #444; }
      .btn-lookup {
        background: #1a5f2a;
        color: #fff;
      }
      .btn-lookup:hover {
        background: #0d3d18;
      }
      .btn-lookup.is-loading { background: #1a5f2a; }
      .btn-danger { background: #c33; }
      .btn-danger:hover { background: #a22; }
      .btn-sm { padding: 0.4em 0.9em; min-height: 2rem; font-size: 0.875rem; }
      .btn.is-loading, .btn.is-saving {
        pointer-events: none;
        opacity: 0.85;
      }
      .btn.is-loading::after, .btn.is-saving::after {
        content: '';
        display: inline-block;
        width: 1em;
        height: 1em;
        margin-left: 0.5em;
        vertical-align: middle;
        border: 2px solid rgba(255,255,255,0.5);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .admin-hero-top { margin-top: 0; position: relative; }
      .admin-hero-logo {
        position: absolute;
        top: 0.75rem;
        left: 0.75rem;
        z-index: 2;
      }
      .admin-hero-logo a { display: block; }
      .admin-hero-logo img { display: block; height: 2.5rem; width: auto; }
      .courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.25em;
      }
      .course-card {
        background: #2a2a2a;
        border: 2px solid transparent;
        border-radius: 12px;
        padding: 1.25em;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
        cursor: pointer;
      }
      .course-card:hover {
        box-shadow: 0 6px 16px rgba(0,0,0,0.3);
        border-color: var(--admin-primary);
        transform: translateY(-4px);
      }
      .course-card__row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1em;
      }
      .course-card__title {
        font-weight: 700;
        color: white;
        font-size: 1.1em;
        flex: 1;
        min-width: 0;
      }
      .course-card__par {
        color: #b0b0b0;
        font-size: 0.95em;
        flex-shrink: 0;
      }
      .course-card__par strong { color: #2dc26b; }
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.45);
        overflow: auto;
        padding: 1em;
        box-sizing: border-box;
      }
      .modal.is-open {
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .modal-content {
        background: white;
        margin: 2vh auto;
        padding: 2em;
        border-radius: 10px;
        max-width: 640px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5em;
        padding-bottom: 1em;
        border-bottom: 1px solid var(--admin-border);
      }
      .modal-header h2 { margin: 0; color: var(--admin-primary); font-size: 1.35rem; }
      .close {
        color: #888;
        font-size: 1.75rem;
        line-height: 1;
        cursor: pointer;
        border: none;
        background: none;
        padding: 0.25em;
        width: 36px;
        height: 36px;
        border-radius: 6px;
        transition: background 0.2s, color 0.2s;
      }
      .close:hover { color: #000; background: #eee; }
      .form-group { margin-bottom: 1.2em; }
      .form-group label {
        display: block;
        margin-bottom: 0.4em;
        font-weight: 600;
        color: #333;
      }
      .form-group input {
        width: 100%;
        padding: 0.65em 0.85em;
        border: 1px solid var(--admin-border);
        border-radius: 6px;
        font-size: 1em;
        box-sizing: border-box;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--admin-primary);
        box-shadow: 0 0 0 2px rgba(45, 194, 107, 0.2);
      }
      .form-group__lookup {
        margin-top: 0.5em;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5em;
      }
      .form-group__lookup .lookup-status {
        margin: 0;
      }
      .hole-grid-section {
        margin-top: 1.5em;
        margin-bottom: 1em;
      }
      .hole-grid-section label { font-weight: 600; color: #333; margin-bottom: 0.5em; display: block; }
      .hole-grid-wrap {
        display: flex;
        justify-content: center;
        max-width: 100%;
      }
      .hole-table {
        width: auto;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      .hole-table th,
      .hole-table td {
        padding: 0.2em 0.35em;
        text-align: left;
        border-bottom: 1px solid var(--admin-border);
      }
      .hole-table th {
        background: var(--admin-bg);
        font-weight: 600;
        color: #333;
      }
      .hole-table th.hole-table__group {
        text-align: center;
        font-size: 0.85em;
        color: #555;
      }
      .hole-table .hole-table__sep {
        width: 0.5rem;
        padding-left: 0.25em;
        border-left: 1px solid var(--admin-border);
      }
      .hole-table input {
        width: 2.5em;
        padding: 0.25em;
        border: 1px solid var(--admin-border);
        border-radius: 4px;
        font-size: 1em;
        text-align: center;
      }
      .hole-table input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
      .hole-table input[type="number"]::-webkit-outer-spin-button,
      .hole-table input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      .hole-table td:nth-child(3) input,
      .hole-table td:nth-child(7) input {
        font-size: 0.85em;
      }
      .hole-table input.is-different {
        background: #fff3cd;
      }
      .hole-table .hole-total-row {
        font-weight: 600;
        background: var(--admin-bg);
      }
      .hole-table .hole-total-row td { padding: 0.5em 0.5em; }
      .btn-before-after {
        padding: 0.35em 0.6em;
        font-size: 0.85rem;
        min-height: 1.75rem;
        min-width: 5.5em;
        box-sizing: border-box;
        background: #f0f0f0;
        color: #333;
        border: 1px solid #ccc;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-before-after:hover { background: #e5e5e5; }
      .form-actions {
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        justify-content: flex-start;
        gap: 0.75em;
        margin-top: 1.75em;
        padding-top: 1.25em;
        border-top: 1px solid var(--admin-border);
      }
      .form-actions__spacer { flex: 1; min-width: 0.5rem; }
      .form-actions .btn {
        height: 2.5rem;
        min-height: 2.5rem;
        padding: 0 1.25em;
        font-size: 1rem;
        flex-shrink: 0;
        min-width: 6em;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
      }
      @media (max-width: 480px) {
        .form-actions { gap: 0.5em; }
        .form-actions .btn.btn-danger,
        .form-actions .btn.btn-secondary {
          min-width: 4.5em;
          padding: 0 0.6em;
          font-size: 0.9rem;
        }
        .form-actions .btn:not(.btn-danger):not(.btn-secondary) {
          min-width: 5em;
          padding: 0 0.75em;
          font-size: 0.9rem;
        }
      }
      @media (max-width: 420px) {
        .form-actions {
          flex-direction: column;
          align-items: center;
          gap: 0.5em;
        }
        .form-actions .btn {
          min-width: 0;
          width: 100%;
          max-width: 14rem;
          padding: 0 1.25em;
          font-size: 1rem;
          margin-left: 0;
          margin-right: 0;
          box-sizing: border-box;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .form-actions .btn.btn-danger,
        .form-actions .btn.btn-secondary {
          min-width: 0;
          width: 100%;
          max-width: 14rem;
          padding: 0 1.25em;
          font-size: 1rem;
          margin-left: 0;
          margin-right: 0;
          box-sizing: border-box;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }
        .form-actions__spacer { display: none; }
      }
      .lookup-status { margin-top: 0.5em; min-height: 1.25em; font-size: 0.9rem; color: #666; }
      .lookup-status.error { color: #721c24; background: #f8d7da; padding: 0.5em 0.75em; border-radius: 6px; }
      .alert {
        padding: 0.9em 1.2em;
        margin: 0 0 1em 0;
        border-radius: 6px;
      }
      .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
      .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
      .empty-state {
        text-align: center;
        padding: 3em 2em;
        color: #666;
        background: var(--admin-bg);
        border-radius: 8px;
        border: 1px dashed var(--admin-border);
      }
      .empty-state p { margin: 0 0 1em 0; }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="hero hero--banner admin-hero-top">
      <div class="admin-hero-logo">
        <a href="../index.html">
          <img src="../assets/images/TGA.png" alt="TGA" width="80" height="40" />
        </a>
      </div>
      <figure class="hero__image">
        <div class="hero__image-wrapper">
          <img src="../assets/images/golfBanner.jpg" loading="eager" alt="Golf course" />
        </div>
      </figure>
      <header class="hero__content hero__content--overlay">
        <div class="wrapper">
          <h1>Manage Courses</h1>
        </div>
      </header>
    </div>
    <main class="page">
      <article class="content">
        <div class="entry-wrapper content__entry">
          <div class="admin-container">
            <div class="admin-header">
              <a href="societies.html" class="btn btn-secondary">← Societies</a>
              <button type="button" class="btn" id="btnAddCourse">+ Add course</button>
            </div>

            <div id="alertContainer"></div>

            <div id="courses-container">
              <div class="empty-state">Loading…</div>
            </div>
          </div>
        </div>
      </article>
    </main>

    <!-- Course Add/Edit Modal -->
    <div id="courseModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="courseModalTitle">
      <div class="modal-content" role="document">
        <div class="modal-header">
          <h2 id="courseModalTitle">Add course</h2>
          <button type="button" class="close" id="courseModalClose" aria-label="Close">&times;</button>
        </div>
        <form id="courseForm">
          <div class="form-group">
            <label for="editCourseName">Course name *</label>
            <input type="text" id="editCourseName" required placeholder="e.g. Elmgreen Golf Club" />
            <div class="form-group__lookup">
              <button type="button" id="lookupBtn" class="btn btn-lookup btn-sm">Look up with AI</button>
              <div id="lookupStatus" class="lookup-status" role="status" aria-live="polite"></div>
            </div>
          </div>
          <div class="form-group">
            <label for="editClubName">Club name</label>
            <input type="text" id="editClubName" placeholder="e.g. Elmgreen Golf Club" />
          </div>
          <div class="form-group">
            <label for="editCourseURL">Course / club website</label>
            <input type="text" id="editCourseURL" placeholder="https://..." />
          </div>

          <div class="hole-grid-section">
            <label>Holes — Par and stroke index</label>
            <div class="hole-grid-wrap">
              <table class="hole-table" id="holeTable">
                <thead>
                  <tr>
                    <th colspan="3" class="hole-table__group">Front 9</th>
                    <th class="hole-table__sep"></th>
                    <th colspan="3" class="hole-table__group">Back 9</th>
                  </tr>
                  <tr>
                    <th>#</th><th>Par</th><th>Index</th>
                    <th class="hole-table__sep"></th>
                    <th>#</th><th>Par</th><th>Index</th>
                  </tr>
                </thead>
                <tbody id="holeTbody"></tbody>
                <tfoot>
                  <tr class="hole-total-row">
                    <td>Out</td><td id="parOut">0</td><td></td>
                    <td class="hole-table__sep"></td>
                    <td>In</td><td id="parIn">0</td><td></td>
                  </tr>
                  <tr class="hole-total-row">
                    <td id="beforeAfterCell"></td><td></td><td></td>
                    <td class="hole-table__sep"></td>
                    <td></td>
                    <td>Par</td><td id="parTotal">0</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-danger" id="courseFormDelete" style="display: none;">Delete</button>
            <button type="button" class="btn btn-secondary" id="courseFormCancel">Cancel</button>
            <span class="form-actions__spacer" aria-hidden="true"></span>
            <button type="submit" class="btn" id="courseFormSubmit">Save course</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="footer">
      <div class="wrapper">
        <div class="footer__copyright">
          <p><span style="color: #169179;">Courses Admin</span></p>
        </div>
      </div>
    </footer>

    <script src="../assets/js/config/app-config.js"></script>
    <script src="../assets/js/utils/api-client.js"></script>
    <script>
      (function() {
        const alertContainer = document.getElementById('alertContainer');
        const coursesContainer = document.getElementById('courses-container');
        const lookupBtn = document.getElementById('lookupBtn');
        const lookupStatus = document.getElementById('lookupStatus');
        const btnAddCourse = document.getElementById('btnAddCourse');
        const courseModal = document.getElementById('courseModal');
        const courseModalTitle = document.getElementById('courseModalTitle');
        const courseModalClose = document.getElementById('courseModalClose');
        const courseForm = document.getElementById('courseForm');
        const editCourseName = document.getElementById('editCourseName');
        const editClubName = document.getElementById('editClubName');
        const editCourseURL = document.getElementById('editCourseURL');
        const holeTbody = document.getElementById('holeTbody');
        const parOutEl = document.getElementById('parOut');
        const parInEl = document.getElementById('parIn');
        const parTotalEl = document.getElementById('parTotal');
        const beforeAfterCell = document.getElementById('beforeAfterCell');
        const courseFormDelete = document.getElementById('courseFormDelete');
        const courseFormCancel = document.getElementById('courseFormCancel');
        const courseFormSubmit = document.getElementById('courseFormSubmit');

        let courses = [];
        let editingCourse = null;
        var beforeLookupData = null;
        var afterLookupData = null;
        var showingAfter = true;

        function escapeHtml(text) {
          if (text == null) return '';
          const div = document.createElement('div');
          div.textContent = String(text);
          return div.innerHTML;
        }

        function escJs(s) {
          return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r/g, '').replace(/\n/g, '\\n');
        }

        /** Parse parIndx string into { pars: [18], indexes: [18] }. Format: "p1,...,p18,i1,...,i18" */
        function parseParIndx(parIndx) {
          const s = (parIndx || '').toString().trim();
          const parts = s ? s.split(',') : [];
          const pars = [];
          const indexes = [];
          for (var i = 0; i < 18; i++) {
            pars.push(parseInt(parts[i], 10) || 0);
            indexes.push(parseInt(parts[i + 18], 10) || 0);
          }
          return { pars: pars, indexes: indexes };
        }

        /** Compute par total from parIndx string */
        function parTotalFromParIndx(parIndx) {
          const p = parseParIndx(parIndx);
          return p.pars.reduce(function(a, b) { return a + b; }, 0);
        }

        /** Build parIndx string from 18 par and 18 index inputs */
        function buildParIndxFromInputs() {
          var pars = [], indexes = [];
          for (var i = 1; i <= 18; i++) {
            var parInp = document.getElementById('holePar' + i);
            var idxInp = document.getElementById('holeIdx' + i);
            pars.push(parseInt(parInp && parInp.value ? parInp.value : 0, 10) || 0);
            indexes.push(parseInt(idxInp && idxInp.value ? idxInp.value : 0, 10) || 0);
          }
          return pars.join(',') + ',' + indexes.join(',');
        }

        function updateParTotals() {
          var out = 0, inTot = 0;
          for (var i = 1; i <= 9; i++) {
            var el = document.getElementById('holePar' + i);
            if (el) out += parseInt(el.value, 10) || 0;
          }
          for (var j = 10; j <= 18; j++) {
            var el = document.getElementById('holePar' + j);
            if (el) inTot += parseInt(el.value, 10) || 0;
          }
          if (parOutEl) parOutEl.textContent = out;
          if (parInEl) parInEl.textContent = inTot;
          if (parTotalEl) parTotalEl.textContent = out + inTot;
        }

        function renderHoleInputs() {
          holeTbody.innerHTML = '';
          for (var h = 1; h <= 9; h++) {
            var tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' + h + '</td><td><input type="number" min="3" max="5" id="holePar' + h + '" value="0" /></td><td><input type="number" min="1" max="18" id="holeIdx' + h + '" value="0" /></td>' +
              '<td class="hole-table__sep"></td>' +
              '<td>' + (h + 9) + '</td><td><input type="number" min="3" max="5" id="holePar' + (h + 9) + '" value="0" /></td><td><input type="number" min="1" max="18" id="holeIdx' + (h + 9) + '" value="0" /></td>';
            holeTbody.appendChild(tr);
          }
          [].forEach.call(document.querySelectorAll('#holeTable input'), function(inp) {
            inp.addEventListener('input', updateParTotals);
            inp.addEventListener('change', updateParTotals);
          });
          updateParTotals();
        }

        function setHoleValues(pars, indexes) {
          for (var i = 0; i < 18; i++) {
            var parInp = document.getElementById('holePar' + (i + 1));
            var idxInp = document.getElementById('holeIdx' + (i + 1));
            if (parInp) parInp.value = pars[i] || 0;
            if (idxInp) idxInp.value = indexes[i] || 0;
          }
          updateParTotals();
        }

        /** Get current pars and indexes from form inputs */
        function getCurrentHoleDataFromForm() {
          return parseParIndx(buildParIndxFromInputs());
        }

        /** Mark inputs that differ from the given "other" set with is-different */
        function applyDiffHighlights(otherPars, otherIndexes) {
          if (!otherPars || !otherIndexes) return;
          for (var i = 0; i < 18; i++) {
            var parInp = document.getElementById('holePar' + (i + 1));
            var idxInp = document.getElementById('holeIdx' + (i + 1));
            var curPar = parseInt(parInp && parInp.value ? parInp.value : 0, 10) || 0;
            var curIdx = parseInt(idxInp && idxInp.value ? idxInp.value : 0, 10) || 0;
            var otherP = otherPars[i] || 0;
            var otherI = otherIndexes[i] || 0;
            if (parInp) {
              if (curPar !== otherP) parInp.classList.add('is-different');
              else parInp.classList.remove('is-different');
            }
            if (idxInp) {
              if (curIdx !== otherI) idxInp.classList.add('is-different');
              else idxInp.classList.remove('is-different');
            }
          }
        }

        function clearBeforeAfterState() {
          beforeLookupData = null;
          afterLookupData = null;
          showingAfter = true;
          beforeAfterCell.innerHTML = '';
          [].forEach.call(document.querySelectorAll('#holeTable input.is-different'), function(inp) { inp.classList.remove('is-different'); });
        }

        function showBeforeAfterToggle() {
          beforeAfterCell.innerHTML = '';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'btn-before-after';
          btn.textContent = showingAfter ? 'After' : 'Before';
          btn.addEventListener('click', function() {
            if (!beforeLookupData || !afterLookupData) return;
            if (showingAfter) {
              setHoleValues(beforeLookupData.pars, beforeLookupData.indexes);
              showingAfter = false;
              applyDiffHighlights(afterLookupData.pars, afterLookupData.indexes);
              btn.textContent = 'Before';
            } else {
              setHoleValues(afterLookupData.pars, afterLookupData.indexes);
              showingAfter = true;
              applyDiffHighlights(beforeLookupData.pars, beforeLookupData.indexes);
              btn.textContent = 'After';
            }
          });
          beforeAfterCell.appendChild(btn);
        }

        function showAlert(type, message) {
          const alert = document.createElement('div');
          alert.className = 'alert alert-' + type;
          alert.textContent = message;
          alertContainer.innerHTML = '';
          alertContainer.appendChild(alert);
          setTimeout(function() { alert.remove(); }, 6000);
        }

        function setLookupStatus(msg, isError) {
          lookupStatus.textContent = msg || '';
          lookupStatus.className = 'lookup-status' + (isError ? ' error' : '');
        }

        function loadCourses() {
          ApiClient.get({ action: 'getCourses', _useAppsScript: true })
            .then(function(res) {
              courses = (res && res.courses) || [];
              renderCourses();
            })
            .catch(function(err) {
              courses = [];
              coursesContainer.innerHTML = '<div class="empty-state">Error loading courses: ' + escapeHtml(err.message || 'Unknown error') + '</div>';
            });
        }

        function renderCourses() {
          if (courses.length === 0) {
            coursesContainer.innerHTML = '<div class="empty-state"><p>No courses yet.</p><p><button type="button" class="btn" id="btnAddCourseEmpty">+ Add course</button></p></div>';
            var btn = document.getElementById('btnAddCourseEmpty');
            if (btn) btn.addEventListener('click', openAddModal);
            return;
          }
          var sorted = courses.slice().sort(function(a, b) {
            return (a.courseName || '').localeCompare(b.courseName || '', undefined, { sensitivity: 'base' });
          });
          var html = '<div class="courses-grid">';
          sorted.forEach(function(c) {
            var parTot = parTotalFromParIndx(c.parIndx);
            var nameEsc = escapeHtml(c.courseName || '');
            html += '<div class="course-card" data-course-name="' + nameEsc + '" role="button" tabindex="0">' +
              '<div class="course-card__row">' +
              '<span class="course-card__title">' + nameEsc + '</span>' +
              '<span class="course-card__par">Par: <strong>' + parTot + '</strong></span>' +
              '</div>' +
              '</div>';
          });
          html += '</div>';
          coursesContainer.innerHTML = html;
          coursesContainer.querySelectorAll('.course-card').forEach(function(card) {
            card.addEventListener('click', function() { window.editCourse(card.getAttribute('data-course-name')); });
            card.addEventListener('keydown', function(e) {
              if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                window.editCourse(card.getAttribute('data-course-name'));
              }
            });
          });
        }

        window.editCourse = function(courseName) {
          var c = courses.find(function(x) { return (x.courseName || '').trim().toLowerCase() === String(courseName).toLowerCase(); });
          if (!c) {
            showAlert('error', 'Course not found');
            return;
          }
          clearBeforeAfterState();
          editingCourse = c;
          courseModalTitle.textContent = 'Edit course';
          editCourseName.value = c.courseName || '';
          editCourseName.disabled = false;
          editClubName.value = c.clubName || '';
          editCourseURL.value = c.courseURL || '';
          var p = parseParIndx(c.parIndx);
          setHoleValues(p.pars, p.indexes);
          courseFormDelete.style.display = 'inline-block';
          courseModal.classList.add('is-open');
          document.body.style.overflow = 'hidden';
        };

        function openAddModal() {
          editingCourse = null;
          clearBeforeAfterState();
          courseModalTitle.textContent = 'Add course';
          courseForm.reset();
          editCourseName.disabled = false;
          editCourseName.value = '';
          editClubName.value = '';
          editCourseURL.value = '';
          setLookupStatus('');
          renderHoleInputs();
          courseFormDelete.style.display = 'none';
          courseModal.classList.add('is-open');
          document.body.style.overflow = 'hidden';
          setTimeout(function() { editCourseName.focus(); }, 50);
        }

        function closeCourseModal() {
          courseModal.classList.remove('is-open');
          document.body.style.overflow = '';
          editingCourse = null;
          clearBeforeAfterState();
          setLookupStatus('');
        }

        function openAddModalWithData(data) {
          editingCourse = null;
          courseModalTitle.textContent = 'Add course';
          fillCourseFormFromData(data);
          courseFormDelete.style.display = 'none';
          courseModal.classList.add('is-open');
          document.body.style.overflow = 'hidden';
        }

        /** Populate course form fields and hole grid from API/data (used after AI lookup or when opening with data). */
        function fillCourseFormFromData(data) {
          editCourseName.value = data.courseName || '';
          editClubName.value = data.clubName || '';
          editCourseURL.value = data.courseURL || '';
          var p = parseParIndx(data.parIndx || '');
          if (holeTbody.innerHTML === '') renderHoleInputs();
          setHoleValues(p.pars, p.indexes);
        }

        btnAddCourse.addEventListener('click', openAddModal);
        courseModalClose.addEventListener('click', closeCourseModal);
        courseFormCancel.addEventListener('click', closeCourseModal);

        courseForm.addEventListener('submit', function(e) {
          e.preventDefault();
          var name = (editCourseName.value || '').trim();
          if (!name) {
            showAlert('error', 'Course name is required.');
            return;
          }
          var parIndx = buildParIndxFromInputs();
          var payload = {
            courseName: name,
            parIndx: parIndx,
            courseURL: (editCourseURL.value || '').trim(),
            clubName: (editClubName.value || '').trim(),
            courseMaploc: '',
            courseImage: ''
          };
          if (editingCourse) payload.originalCourseName = (editingCourse.courseName || '').trim();
          courseFormSubmit.disabled = true;
          courseFormSubmit.classList.add('is-saving');
          courseFormSubmit.textContent = 'Saving…';
          ApiClient.post(editingCourse ? 'updateCourse' : 'saveCourse', payload)
            .then(function() {
              courseFormSubmit.disabled = false;
              courseFormSubmit.classList.remove('is-saving');
              courseFormSubmit.textContent = 'Save course';
              showAlert('success', editingCourse ? 'Course updated.' : 'Course saved.');
              closeCourseModal();
              loadCourses();
            })
            .catch(function(err) {
              courseFormSubmit.disabled = false;
              courseFormSubmit.classList.remove('is-saving');
              courseFormSubmit.textContent = 'Save course';
              showAlert('error', err.message || 'Save failed.');
            });
        });

        courseFormDelete.addEventListener('click', function() {
          if (!editingCourse || !editingCourse.courseName) return;
          var _cn = editingCourse.courseName; if (!confirm("Delete course \"" + _cn.replace(/"/g, '\\"') + "\"? This cannot be undone.")) return;
          courseFormDelete.disabled = true;
          courseFormSubmit.disabled = true;
          courseFormCancel.disabled = true;
          ApiClient.post('deleteCourse', { courseName: editingCourse.courseName })
            .then(function() {
              showAlert('success', 'Course deleted.');
              closeCourseModal();
              loadCourses();
            })
            .catch(function(err) {
              showAlert('error', err.message || 'Delete failed.');
            })
            .finally(function() {
              courseFormDelete.disabled = false;
              courseFormSubmit.disabled = false;
              courseFormCancel.disabled = false;
            });
        });

        lookupBtn.addEventListener('click', function() {
          var name = (editCourseName.value || '').trim();
          if (!name) {
            setLookupStatus('Enter a course name first.', true);
            return;
          }
          setLookupStatus('Searching the web…');
          lookupBtn.disabled = true;
          lookupBtn.classList.add('is-loading');
          ApiClient.post('lookupCourseWithAI', { courseName: name })
            .then(function(res) {
              lookupBtn.disabled = false;
              lookupBtn.classList.remove('is-loading');
              if (!res.success) {
                console.warn('[Lookup] Course lookup failed.', {
                  courseName: name,
                  serverError: res.error || '(no message)',
                  fullResponse: res
                });
                setLookupStatus('This course could not be identified. Try adding more information in the course name (e.g. town, country, or golf club).', true);
                return;
              }
              setLookupStatus('');
              if (editingCourse) {
                beforeLookupData = getCurrentHoleDataFromForm();
                var afterPars = parseParIndx(res.parIndx || '');
                afterLookupData = { pars: afterPars.pars, indexes: afterPars.indexes };
                fillCourseFormFromData({
                  courseName: res.courseName,
                  parIndx: res.parIndx,
                  courseURL: res.courseURL,
                  clubName: res.clubName
                });
                showingAfter = true;
                applyDiffHighlights(beforeLookupData.pars, beforeLookupData.indexes);
                showBeforeAfterToggle();
              } else {
                fillCourseFormFromData({
                  courseName: res.courseName,
                  parIndx: res.parIndx,
                  courseURL: res.courseURL,
                  clubName: res.clubName
                });
              }
            })
            .catch(function(err) {
              lookupBtn.disabled = false;
              lookupBtn.classList.remove('is-loading');
              console.warn('[Lookup] Course lookup request failed.', {
                courseName: name,
                errorMessage: err && err.message,
                error: err
              });
              setLookupStatus('This course could not be identified. Try adding more information in the course name (e.g. town, country, or golf club).', true);
            });
        });

        window.onclick = function(event) {
          if (event.target === courseModal) closeCourseModal();
        };

        renderHoleInputs();
        if (typeof AppConfig !== 'undefined' && AppConfig.init) {
          AppConfig.init().then(loadCourses).catch(function() { loadCourses(); });
        } else {
          loadCourses();
        }
      })();
    </script>
  </body>
</html>
